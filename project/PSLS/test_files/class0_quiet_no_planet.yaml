# PSLS configuration — Class 0: Quiet star, no planet
# No meaningful activity, no transit.

Observation:
  QuarterDuration: [90., 90., 90.]
  MasterSeed: 1000000001
  Gaps:
    Enable: 1
    Seed: -1
    InterQuarterGapDuration: 3.
    RandomGapDuration: 0.
    RandomGapTimeFraction: 0.5
    RandomGapStep: 0.
    PeriodicGapCadence: 5.
    PeriodicGapDuration: 20.
    PeriodicGapJitter: 2.
    PeriodicGapStep: 0.

Instrument:
  Sampling: 25.
  IntegrationTime: 21.
  GroupID: [1, 2, 3, 4]
  NCamera: 6
  TimeShift: 6.25
  RandomNoise:
    Enable: 1
    Type: PLATO_SIMU
    NSR: 73.
  Systematics:
    Enable: 1
    Table: systematics/PLATO_systematics_BOL_V2.npy
    Version: 2
    DriftLevel: any
    Seed: -1

Star:
  Mag: 10.
  ID: 10000001
  ModelType: grid
  ModelDir: models/
  ModelName: grid_v0.1_ov0-plato
  ES: ms
  Teff: 5778.
  Logg: 4.438
  SurfaceRotationPeriod: 0.
  CoreRotationFreq: 0.
  Inclination: 0.

Oscillations:
  Enable: 1
  numax: 3090.
  delta_nu: 135.
  DPI: -1.
  q: 0.
  SurfaceEffects: 1
  Seed: -1

Activity:
  Enable: 0          # stochastic activity off
  Sigma: 10.
  Tau: 0.5
  Seed: -1

  Spot:
    Enable: 0         # no spots
    dOmega: 0.
    MuStar: 0.59
    MuSpot: 0.78
    Radius: [2.5]
    Latitude: [0.0]
    Longitude: [0.0]
    Lifetime: [30]
    TimeMax: [-1]
    Contrast: [0.7]
    Modulation: 0.
    Seed: -1

  Flare:
    Enable: 0         # no flares
    MeanPeriod: 10
    Amplitude: 500.
    UpDown: 0.1
    MeanDuration: -1
    DurationDispersion: -1
    Seed: -1

Granulation:
  Enable: 1
  Type: 1
  Seed: -1

Transit:
  Enable: 0           # no planet

  # These values are ignored when Enable: 0 but must be present
  PlanetRadius: 1.0
  OrbitalPeriod: 10.
  PlanetSemiMajorAxis: 0.1
  OrbitalAngle: 0.
  LimbDarkeningCoefficients: [0.25, 0.75]

External:
  Enable: 0
  FilePath: examples/external_example.txt
