# PSLS configuration — Class 1: Activity only, no planet
# Strong spot modulation + stochastic activity + flares.
# Designed to produce variability that could be mistaken for transits (false positive regime).

Observation:
  QuarterDuration: [90., 90., 90.]
  MasterSeed: 1000000002
  Gaps:
    Enable: 1
    Seed: -1
    InterQuarterGapDuration: 3.
    RandomGapDuration: 0.
    RandomGapTimeFraction: 0.5
    RandomGapStep: 0.
    PeriodicGapCadence: 5.
    PeriodicGapDuration: 20.
    PeriodicGapJitter: 2.
    PeriodicGapStep: 0.

Instrument:
  Sampling: 25.
  IntegrationTime: 21.
  GroupID: [1, 2, 3, 4]
  NCamera: 6
  TimeShift: 6.25
  RandomNoise:
    Enable: 1
    Type: PLATO_SIMU
    NSR: 73.
  Systematics:
    Enable: 1
    Table: systematics/PLATO_systematics_BOL_V2.npy
    Version: 2
    DriftLevel: any
    Seed: -1

Star:
  Mag: 10.
  ID: 10000002
  ModelType: grid
  ModelDir: models/
  ModelName: grid_v0.1_ov0-plato
  ES: ms
  Teff: 5778.
  Logg: 4.438
  SurfaceRotationPeriod: 12.   # fast rotator → large spot signal
  CoreRotationFreq: 0.
  Inclination: 60.             # inclined so spots modulate flux strongly

Oscillations:
  Enable: 1
  numax: 3090.
  delta_nu: 135.
  DPI: -1.
  q: 0.
  SurfaceEffects: 1
  Seed: -1

Activity:
  Enable: 1                    # stochastic activity ON
  Sigma: 150.                  # large stochastic amplitude (ppm)
  Tau: 1.5                     # timescale comparable to short transit durations
  Seed: -1

  Spot:
    Enable: 1                  # spots ON — dominant variability source
    dOmega: 0.1                # mild differential rotation
    MuStar: 0.59
    MuSpot: 0.78
    Radius: [5.0, 4.0, 3.5]   # large spots
    Latitude: [10.0, 25.0, -15.0]
    Longitude: [0.0, 120.0, 240.0]
    Lifetime: [40, 25, 60]
    TimeMax: [-1, -1, -1]
    Contrast: [0.5, 0.6, 0.55] # high contrast spots
    Modulation: 0.
    Seed: -1

  Flare:
    Enable: 1                  # flares ON — additional short-duration spikes
    MeanPeriod: 3              # frequent flares (every ~3 days on average)
    Amplitude: 2500.           # mean flare amplitude (ppm)
    UpDown: 0.1
    MeanDuration: -1
    DurationDispersion: -1
    Seed: -1

Granulation:
  Enable: 1
  Type: 1
  Seed: -1

Transit:
  Enable: 0                    # no planet

  PlanetRadius: 1.0
  OrbitalPeriod: 10.
  PlanetSemiMajorAxis: 0.1
  OrbitalAngle: 0.
  LimbDarkeningCoefficients: [0.25, 0.75]

External:
  Enable: 0
  FilePath: examples/external_example.txt
